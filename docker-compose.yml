version: '3.8'

services:
  chatlayer:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: chatlayer-server
    ports:
      - "31000:31000"
    environment:
      - NODE_ENV=production
      - FILE_SIGNING_SECRET=${FILE_SIGNING_SECRET:-change-me-in-production}
    volumes:
      # Persist database file
      - chatlayer_db:/app/db
      # Persist uploaded files
      - chatlayer_uploads:/app/public/uploads
      # Mount config directory for easy configuration updates
      - ./server/config:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:31000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - chatlayer-network

volumes:
  chatlayer_db:
    driver: local
  chatlayer_uploads:
    driver: local

networks:
  chatlayer-network:
    driver: bridge